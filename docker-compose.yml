version: '3.8'

services:
  # The AI backend for the firewall
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-firewall-ai
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped
    command: serve

  # The main firewall application (Linux dev environment)
  firewall-dev:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: firewall-core-dev
    environment:
      - AI_MODEL_URL=http://ollama:11434
      - AI_MODEL_NAME=qwen2.5-coder:7b
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    depends_on:
      - ollama
    privileged: true # Required for network interception (NFQUEUE/eBPF)
    network_mode: host # For intercepting host traffic during tests
